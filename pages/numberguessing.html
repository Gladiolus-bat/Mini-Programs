<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        nav {
            padding: 15px 0;
            margin-bottom: 30px;
        }

        nav a {
            text-decoration: none;
            color: #ffffff;
            font-size: 1.2rem;
            transition: color 0.3s;
            background-color: hsl(97, 58%, 70%);
            padding: 10px 20px;
            border-radius: 5px;
        }

        nav a:hover {
            color: #000;
        }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            background-color: hsl(97, 58%, 70%);
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background-color: hsl(97, 58%, 60%);
        }

        #feedback {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="../index.html">Home</a>
    </nav>

    <h1>Number Guessing Game</h1>
    <p>Guess a number between 1 and 100:</p>
    <input type="number" id="guessInput" min="1" max="100">
    <button onclick="checkGuess()" id="guessSubmit">Submit Guess</button>
    <p id="feedback"></p>
    <script src="../scripts/numberGuessing.js"></script>
</body>

</html>
