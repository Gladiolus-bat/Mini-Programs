<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Watch</title>
    <link rel="stylesheet" href="../styles/stopWatch.css">
</head>
<body>
    <nav>
        <a href="../index.html">Home</a>
    </nav>
    
    <h1 id="myH1">Stop Watch</h1>

    <div id="container">
        <div id="display">
            00:00:00:00
        </div>
        <div id="controls">
            <button id="startBtn" onclick="startStopwatch()">Start</button>
            <button id="stopBtn" onclick="stopStopwatch()">Stop</button>
            <button id="resetBtn" onclick="resetStopwatch()">Reset</button>
        </div>
    </div>

    <script src="../scripts/stopWatch.js"></script>
</body>
</html>
